name: Migration Guard

# Structural enforcement for L1-L2 schema migrations (ADR A4).
# Any PR touching apps/api/migrations/*.sql must have an explicit CTO
# authorization token before it can be merged.
#
# Authorization token: CTO (@MichalHlavac) posts a PR comment containing:
#   merge-authorized: <PR-number>
#
# This check re-runs on every push to the PR and on every new PR comment,
# so the status updates as soon as the token is posted.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read

jobs:
  migration-auth:
    name: migration-auth
    # Run on PR events, or on comments that are on a PR (issue.pull_request != null)
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)
    runs-on: ubuntu-latest

    steps:
      - name: Resolve PR number
        id: resolve-pr
        uses: actions/github-script@v8
        with:
          script: |
            let prNumber;
            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
            } else {
              if (!context.payload.issue.pull_request) {
                core.info('Comment on plain issue (not a PR) — skipping');
                return null;
              }
              prNumber = context.payload.issue.number;
            }
            core.setOutput('number', String(prNumber));
            return prNumber;

      - name: Check migration files and CTO authorization
        if: steps.resolve-pr.outputs.number != ''
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = parseInt('${{ steps.resolve-pr.outputs.number }}', 10);

            // Check which files this PR touches
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const migrationFiles = files.filter(
              f => f.filename.startsWith('apps/api/migrations/') && f.filename.endsWith('.sql')
            );

            if (migrationFiles.length === 0) {
              core.info(`No migration SQL files in PR #${prNumber} — guard not required`);
              return;
            }

            core.info(`Migration files changed: ${migrationFiles.map(f => f.filename).join(', ')}`);

            // Check for CTO authorization token in PR comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const ctoLogin = 'MichalHlavac';
            const token = `merge-authorized: ${prNumber}`;

            // Determine the timestamp of the latest commit on this PR.
            // Authorization is only valid if it was posted AFTER the latest push —
            // any new commits (rebase, fixup) invalidate prior authorization.
            const { data: allCommits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });
            const latestCommit = allCommits[allCommits.length - 1];
            const latestCommitTime = new Date(latestCommit.commit.committer.date);
            core.info(`Latest commit on PR #${prNumber}: ${latestCommit.sha.slice(0,7)} at ${latestCommitTime.toISOString()}`);

            const authComment = comments.find(
              c => c.user.login === ctoLogin &&
                   c.body.includes(token) &&
                   new Date(c.created_at) >= latestCommitTime
            );

            if (!authComment) {
              // Check if there's a stale (pre-push) authorization to give a better message
              const staleAuth = comments.some(
                c => c.user.login === ctoLogin && c.body.includes(token)
              );
              const reason = staleAuth
                ? `A prior \`${token}\` authorization exists but pre-dates the latest push (${latestCommitTime.toISOString()}). Re-authorization required.`
                : `No \`${token}\` authorization comment found from @${ctoLogin}.`;

              core.setFailed(
                [
                  `⛔ L1-L2 schema migration — CTO authorization required.`,
                  ``,
                  `This PR modifies \`apps/api/migrations/*.sql\` which is a schema migration`,
                  `(L1-L2 change tier, ADR A4). Only the CTO may authorize the merge.`,
                  ``,
                  reason,
                  ``,
                  `**@${ctoLogin}** must post the following comment on this PR **after the most recent push**:`,
                  ``,
                  `    merge-authorized: ${prNumber}`,
                  ``,
                  `See \`apps/api/migrations/README.md\` for the full authorization process.`,
                ].join('\n')
              );
            } else {
              core.info(`✅ CTO authorization confirmed for PR #${prNumber} (comment posted ${new Date(authComment.created_at).toISOString()}, after latest commit ${latestCommitTime.toISOString()}) — migration guard passed`);
            }
