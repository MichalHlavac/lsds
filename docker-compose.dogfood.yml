name: lsds-dogfood

# Standalone dogfood compose — fixes tenant UUID mismatch (LSDS-287).
# Run with:   docker compose -f docker-compose.dogfood.yml up --build -d
# Then seed:  bash scripts/seed-dogfood-pilot.sh
# Web UI:     http://localhost:3093

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lsds_pilot
      POSTGRES_USER: lsds
      POSTGRES_PASSWORD: lsds
    volumes:
      - dogfood_db_data:/var/lib/postgresql/data
    ports:
      - "5446:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lsds -d lsds_pilot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    image: ghcr.io/michalhlavac/lsds:1.0.1
    command: node apps/api/dist/db/migrate.js
    environment:
      DATABASE_URL: postgres://lsds:lsds@db:5432/lsds_pilot
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  api:
    image: ghcr.io/michalhlavac/lsds:1.0.1
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://lsds:lsds@db:5432/lsds_pilot
      # Must be a valid UUID — "lsds-pilot" triggers Postgres 22P02 error.
      TENANT_ID: aaaaaaaa-bbbb-cccc-dddd-000000000001
    ports:
      - "3094:3001"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    # Build locally so NEXT_PUBLIC_TENANT_ID is baked into the client bundle.
    # NEXT_PUBLIC_* vars are resolved at Next.js build time, not at runtime.
    build:
      context: .
      args:
        NEXT_PUBLIC_TENANT_ID: aaaaaaaa-bbbb-cccc-dddd-000000000001
    command: node apps/web/.next/standalone/apps/web/server.js
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: http://localhost:3094
      NEXT_PUBLIC_TENANT_ID: aaaaaaaa-bbbb-cccc-dddd-000000000001
    ports:
      - "3093:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  dogfood_db_data:
