name: lsds-dogfood

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lsds_pilot
      POSTGRES_USER: lsds
      POSTGRES_PASSWORD: lsds
    volumes:
      - dogfood_db_data:/var/lib/postgresql/data
    ports:
      - "5446:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lsds -d lsds_pilot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    image: ghcr.io/michalhlavac/lsds:1.0.1
    command: node apps/api/dist/db/migrate.js
    environment:
      DATABASE_URL: postgres://lsds:lsds@db:5432/lsds_pilot
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  api:
    image: ghcr.io/michalhlavac/lsds:1.0.1
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://lsds:lsds@db:5432/lsds_pilot
      TENANT_ID: lsds-pilot
    ports:
      - "3094:3001"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    image: ghcr.io/michalhlavac/lsds:1.0.1
    command: node apps/web/.next/standalone/apps/web/server.js
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: http://localhost:3094
    ports:
      - "3093:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  dogfood_db_data:
