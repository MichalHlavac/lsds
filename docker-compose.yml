services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lsds}
      POSTGRES_USER: ${POSTGRES_USER:-lsds}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lsds}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lsds} -d ${POSTGRES_DB:-lsds}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build:
      context: .
    command: node apps/api/dist/db/migrate.js
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-lsds}:${POSTGRES_PASSWORD:-lsds}@db:5432/${POSTGRES_DB:-lsds}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3001}
      DATABASE_URL: postgres://${POSTGRES_USER:-lsds}:${POSTGRES_PASSWORD:-lsds}@db:5432/${POSTGRES_DB:-lsds}
      TENANT_ID: ${TENANT_ID:-default}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      OIDC_JWKS_URI: ${OIDC_JWKS_URI:-}
    ports:
      - "${API_HOST_PORT:-3001}:${API_PORT:-3001}"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${API_PORT:-3001}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
    command: node apps/web/.next/standalone/apps/web/server.js
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${WEB_PORT:-3000}
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
    ports:
      - "${WEB_HOST_PORT:-3000}:${WEB_PORT:-3000}"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${WEB_PORT:-3000} || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  db_data:
