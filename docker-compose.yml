# Self-hosted LSDS — uses published ghcr.io images.
# 1. Copy .env.example to .env and fill in your values.
# 2. docker compose up -d
#
# NOTE: NEXT_PUBLIC_API_URL and NEXT_PUBLIC_TENANT_ID are baked into the
# pre-built web image at release time (defaults: http://localhost:3001 and
# 00000000-0000-0000-0000-000000000001). To use custom values, rebuild the
# image locally with: docker compose up --build

name: lsds

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lsds}
      POSTGRES_USER: ${POSTGRES_USER:-lsds}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lsds} -d ${POSTGRES_DB:-lsds}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    image: ghcr.io/michalhlavac/lsds:${LSDS_VERSION:-latest}
    command: node apps/api/dist/db/migrate.js
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-lsds}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-lsds}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  api:
    image: ghcr.io/michalhlavac/lsds:${LSDS_VERSION:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3001}
      DATABASE_URL: postgres://${POSTGRES_USER:-lsds}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-lsds}
      TENANT_ID: ${TENANT_ID:-00000000-0000-0000-0000-000000000001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_IDLE_TIMEOUT: ${DB_IDLE_TIMEOUT:-30}
      DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-10}
      CACHE_TTL_MS: ${CACHE_TTL_MS:-300000}
      CACHE_WARMUP_LIMIT: ${CACHE_WARMUP_LIMIT:-500}
      LIFECYCLE_RETENTION_DAYS: ${LIFECYCLE_RETENTION_DAYS:-30}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      OIDC_JWKS_URI: ${OIDC_JWKS_URI:-}
    ports:
      - "${API_HOST_PORT:-3001}:${API_PORT:-3001}"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${API_PORT:-3001}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  bootstrap:
    image: ghcr.io/michalhlavac/lsds:${LSDS_VERSION:-latest}
    command: node apps/api/dist/bootstrap-cli.js
    environment:
      API_URL: http://api:${API_PORT:-3001}
      TENANT_ID: ${TENANT_ID:-00000000-0000-0000-0000-000000000001}
      TENANT_NAME: ${TENANT_NAME:-default}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    depends_on:
      api:
        condition: service_healthy
    restart: "no"

  web:
    image: ghcr.io/michalhlavac/lsds:${LSDS_VERSION:-latest}
    command: node apps/web/.next/standalone/apps/web/server.js
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${WEB_PORT:-3000}
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_TENANT_ID: ${NEXT_PUBLIC_TENANT_ID:-00000000-0000-0000-0000-000000000001}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
    ports:
      - "${WEB_HOST_PORT:-3000}:${WEB_PORT:-3000}"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${WEB_PORT:-3000} || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  db_data:
